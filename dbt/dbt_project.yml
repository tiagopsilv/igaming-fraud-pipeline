name: 'igaming_fraud_pipeline'
version: '1.0.0'
config-version: 2

# Connection profile (see profiles.yml in this folder; run with --profiles-dir .)
profile: 'igaming'

require-dbt-version: [">=1.9.0", "<2.0.0"]

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Project variables. The qualified-FTD baseline is a parametrizable business premise (ADR-0011):
# in production the operator sets the real bet baseline.
vars:
  qualified_ftd_baseline: 50

# Materialization per Medallion layer (ADR-0001): Bronze staging = views, Silver = tables.
models:
  igaming_fraud_pipeline:
    staging:
      +materialized: view
    intermediate:
      +materialized: table
    # Gold marts = star schema (ADR-0007). Dimensions/aggregates as tables; the two
    # event facts are incremental (config in-model: transactions=merge, sessions=insert_overwrite).
    marts:
      +materialized: table
