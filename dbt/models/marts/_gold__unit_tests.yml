version: 2

# Unit tests for the Gold business logic - the fraud scoring (case R2) and the affiliate ROI/ghost
# counting. They prove the CODE on controlled inputs, encoding the rules the dashboard depends on.

unit_tests:
  # The fraud core: the risk score is the count of CORE signals, and value_at_risk is the withdrawals.
  # p_clean trips nothing (score 0); p_bad is a ghost-FTD AND net-negative (score 2, high confidence).
  - name: ut_fraud_risk_score_and_value_at_risk
    model: fct_fraud_signals
    description: "risk_score = count of core signals; a ghost-FTD + net-negative player scores 2 (ADR-0013)."
    given:
      - input: ref('int_players_conformed')
        rows:
          - {player_id: p_clean}
          - {player_id: p_bad}
      - input: ref('int_player_qualified_ftd')
        rows:
          - {player_id: p_clean, is_qualified: true}
          - {player_id: p_bad,   is_qualified: false}   # claimed by an affiliate below -> ghost-FTD
      - input: ref('int_player_financials')
        rows:
          - {player_id: p_clean, total_deposits: 100, total_withdrawals: 20,  total_bets: 60, net_deposit: 80}
          - {player_id: p_bad,   total_deposits: 50,  total_withdrawals: 100, total_bets: 20, net_deposit: -50}
      - input: ref('int_player_activity')
        rows:
          - {player_id: p_clean, distinct_ips: 2, distinct_devices: 1, active_span_days: 5}
          - {player_id: p_bad,   distinct_ips: 3, distinct_devices: 1, active_span_days: 5}
      - input: ref('int_player_ledger')
        rows:
          - {transaction_id: c1, player_id: p_clean, txn_ts: "2024-01-01 10:00:00", transaction_type: deposit}
          - {transaction_id: b1, player_id: p_bad,   txn_ts: "2024-01-01 10:00:00", transaction_type: deposit}
      - input: ref('stg_affiliate_cpa_ftd')
        rows:
          - {player_id: p_bad, affiliate_id: a1, country: BR, ftd: 1}   # ftd>0 + not qualified -> ghost
      - input: ref('stg_transactions')
        rows:
          - {player_id: p_bad, transaction_type: deposit, amount: 50}   # 50 % 100 != 0 -> not structuring
      - input: ref('stg_players')
        rows:
          - {player_id: p_clean, created_at: "2024-01-01"}
          - {player_id: p_bad,   created_at: "2024-01-02"}
          # filler on a busy day so the p90 burst threshold excludes the two test players
          - {player_id: f1, created_at: "2024-01-03"}
          - {player_id: f2, created_at: "2024-01-03"}
          - {player_id: f3, created_at: "2024-01-03"}
          - {player_id: f4, created_at: "2024-01-03"}
          - {player_id: f5, created_at: "2024-01-03"}
    expect:
      rows:
        - {player_id: p_clean, s_ghost_ftd: false, s_aml_low_play: false, s_ip_velocity: false,
           s_ledger_anomaly: false, s_net_negative: false, s_structuring: false, s_geo_conflict: false,
           s_device_takeover: false, s_reg_velocity: false, s_dormant: false, value_at_risk: 20, risk_score: 0}
        - {player_id: p_bad, s_ghost_ftd: true, s_aml_low_play: false, s_ip_velocity: false,
           s_ledger_anomaly: false, s_net_negative: true, s_structuring: false, s_geo_conflict: false,
           s_device_takeover: false, s_reg_velocity: false, s_dormant: false, value_at_risk: 100, risk_score: 2}

  # Affiliate performance: ROI = revenue / CPA; ghost-FTD counts claims that never qualified.
  - name: ut_affiliate_roi_and_ghost_count
    model: agg_affiliate_performance
    description: "ROI = real_revenue / cpa_owed; ghost_ftds counts claimed-but-unqualified players (glossary ROI/CPA)."
    given:
      - input: ref('int_player_affiliate_attribution')
        rows:
          - {player_id: p1, affiliate_id: a1, cpa_value: 50}
      - input: ref('int_player_financials')
        rows:
          - {player_id: p1, net_deposit: 200}
      - input: ref('int_player_qualified_ftd')
        rows:
          - {player_id: p1, is_qualified: true}
          - {player_id: p2, is_qualified: false}
      - input: ref('stg_affiliate_cpa_ftd')
        rows:
          - {player_id: p1, affiliate_id: a1, ftd: 1}
          - {player_id: p2, affiliate_id: a1, ftd: 1}   # claimed, never qualified -> ghost for a1
    expect:
      rows:
        - {affiliate_id: a1, qualified_ftds: 1, cpa_owed: 50, real_revenue: 200, roi: 4.0, ghost_ftds: 1}
